services:
  - type: web
    name: prism-patch-api
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PRISM_PATCH_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: capacitor://localhost,ionic://localhost,https://api.prismpatch.app
    disk:
      name: prism-patch-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
